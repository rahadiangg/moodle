apiVersion: v2
name: moodle
description: >-
  Moodle 4.5 LTS for Kubernetes — stateless web tier + single cron, ObjectFS to
  S3-compatible object storage, shared RWX dataroot, sessions/MUC on Redis,
  external PostgreSQL. Cloud-agnostic (tested on Huawei Cloud CCE). Lean
  alternative to the Bitnami chart.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Tracks the Moodle/image version this chart targets.
appVersion: "4.5.11"
kubeVersion: ">=1.28.0-0"
home: https://erseco.github.io/alpine-moodle
sources:
  - https://github.com/erseco/alpine-moodle
  - https://github.com/catalyst/moodle-tool_objectfs
keywords:
  - moodle
  - lms
  - objectfs
  - s3
  - huawei-cce
maintainers:
  - name: pesonaedukasi
# No subcharts: PostgreSQL (RDS), Redis (DCS) and PgBouncer are external.
