{{- /*
Chart-managed Secret (inline/dev mode). Rendered ONLY when auth.existingSecret
is unset. In production, provide a catch-all Secret via auth.existingSecret (or
per-group existingSecret) and this template renders nothing.
*/ -}}
{{- if not .Values.auth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "moodle.fullname" . }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  {{- if not .Values.externalDatabase.existingSecret }}
  db-password: {{ required "auth.dbPassword is required when no externalDatabase.existingSecret/auth.existingSecret is set" .Values.auth.dbPassword | quote }}
  {{- if .Values.externalDatabase.readReplica.enabled }}
  db-password-replica: {{ .Values.auth.dbPasswordReplica | default .Values.auth.dbPassword | quote }}
  {{- end }}
  {{- end }}
  {{- if not .Values.externalRedis.existingSecret }}
  redis-password: {{ .Values.auth.redisPassword | quote }}
  {{- end }}
  admin-password: {{ required "auth.adminPassword is required when no auth.existingSecret is set" .Values.auth.adminPassword | quote }}
  {{- if and .Values.objectfs.enabled (not .Values.objectfs.existingSecret) }}
  s3-access-key: {{ required "auth.s3AccessKey is required when objectfs.enabled and no objectfs.existingSecret/auth.existingSecret" .Values.auth.s3AccessKey | quote }}
  s3-secret-key: {{ required "auth.s3SecretKey is required when objectfs.enabled and no objectfs.existingSecret/auth.existingSecret" .Values.auth.s3SecretKey | quote }}
  {{- end }}
  {{- if and .Values.objectfs.cdn.enabled (not .Values.objectfs.cdn.existingSecret) (not .Values.objectfs.existingSecret) }}
  cdn-signing-key: {{ required "auth.cdnSigningKey is required when objectfs.cdn.enabled and no existingSecret" .Values.auth.cdnSigningKey | quote }}
  {{- end }}
{{- end }}
