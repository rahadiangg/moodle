{{- /* Shared moodledata on an RWX volume. Skipped if an existingClaim is provided. */ -}}
{{- if not .Values.persistence.existingClaim -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "moodle.fullname" . }}-moodledata
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
  annotations:
    # Keep the PVC across `helm uninstall` — moodledata is precious.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
{{- end }}
