{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "moodle.serviceAccountName" . }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
  annotations:
    # Created in the pre-* hook phase (weight -10, before the Jobs at 0/5) so the
    # hook Jobs can use it; persists for the web/cron pods afterwards.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
